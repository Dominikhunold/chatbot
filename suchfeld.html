<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: transparent; font-family: 'Inter', -apple-system, sans-serif; }
.wrapper { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 0; }
.headline { font-size: 15px; font-weight: 400; color: #6b6b65; margin-bottom: 16px; text-align: center; }

.search-bar {
  width: 100%; max-width: 600px; background: white; border-radius: 100px;
  border: 1.5px solid #e0ddd6; display: flex; align-items: center;
  padding: 6px 6px 6px 22px; gap: 12px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-bar:focus-within { border-color: #FF6B4A; box-shadow: 0 2px 16px rgba(255,107,74,0.10); }
.search-icon { flex-shrink: 0; color: #FF6B4A; }
.search-input {
  flex: 1; font-size: 15px; font-weight: 300; color: #1a1a1a;
  padding: 10px 0; border: none; outline: none; background: transparent;
  font-family: 'Inter', -apple-system, sans-serif; min-width: 0;
}
.search-input::placeholder { color: #bbb; }
.search-btn {
  background: #FF6B4A; color: white; border: none; border-radius: 100px;
  padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer;
  white-space: nowrap; flex-shrink: 0; transition: background 0.2s;
  font-family: 'Inter', -apple-system, sans-serif;
}
.search-btn:hover { background: #e85a38; }

@media (max-width: 480px) {
  .search-bar { border-radius: 16px; padding: 10px 16px; flex-wrap: wrap; }
  .search-input { width: 100%; }
  .search-btn { width: 100%; border-radius: 12px; margin-top: 4px; }
  .search-icon { display: none; }
}

.suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 600px; margin-top: 14px; }
.chip {
  background: white; border: 1px solid #e0ddd6; border-radius: 100px;
  padding: 6px 14px; font-size: 13px; color: #4a4a44; cursor: pointer;
  transition: all 0.15s; display: flex; align-items: center; gap: 5px;
  font-family: 'Inter', -apple-system, sans-serif;
}
.chip::before { content: ''; width: 6px; height: 6px; background: #FF6B4A; border-radius: 50%; flex-shrink: 0; opacity: 0.7; }
.chip:hover { background: #FF6B4A; border-color: #FF6B4A; color: white; }
.chip:hover::before { background: white; }

.convo-container {
  width: 100%; max-width: 600px; margin-top: 24px;
  display: none; flex-direction: column; gap: 12px;
}
.convo-container.open { display: flex; }

.msg { display: flex; flex-direction: column; max-width: 85%; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble {
  padding: 10px 15px; border-radius: 18px;
  font-size: 14px; line-height: 1.55; font-weight: 300;
}
.msg.bot .bubble { background: #f0ede8; color: #1a1a1a; border-bottom-left-radius: 4px; }
.msg.user .bubble { background: #FF6B4A; color: white; font-weight: 400; border-bottom-right-radius: 4px; }
.msg-time { font-size: 10px; color: #c4c4bf; margin-top: 4px; font-weight: 300; }
.msg.user .msg-time { text-align: right; }

.typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
.typing-dots span { width: 6px; height: 6px; background: #c4c4bf; border-radius: 50%; animation: dot 1.2s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

.quick-replies { display: flex; flex-wrap: wrap; gap: 6px; max-width: 600px; }
.qr-btn {
  background: white; border: 1.5px solid #e0ddd6; color: #1a1a1a;
  padding: 7px 14px; border-radius: 100px; font-size: 13px;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.14s;
}
.qr-btn:hover { background: #FF6B4A; border-color: #FF6B4A; color: white; }

.convo-input-row {
  display: flex; gap: 8px; align-items: flex-end;
  width: 100%; max-width: 600px; margin-top: 8px;
}
.convo-input {
  flex: 1; padding: 10px 16px; border: 1.5px solid #e0ddd6;
  border-radius: 100px; font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 300; color: #1a1a1a;
  background: white; outline: none; resize: none;
  max-height: 80px; overflow-y: auto; line-height: 1.45;
  transition: border-color 0.2s;
}
.convo-input:focus { border-color: #FF6B4A; }
.convo-input::placeholder { color: #c4c4bf; }
.convo-send {
  width: 38px; height: 38px; min-width: 38px; background: #FF6B4A;
  border: none; border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.2s;
}
.convo-send:hover { background: #e85a38; }

.disclaimer { font-size: 10px; color: #c4c4bf; text-align: center; margin-top: 8px; font-weight: 300; }
.spacer { height: 32px; }
</style>
</head>
<body>
<div class="wrapper">
  <p class="headline">Haben Sie eine Frage an unsere Praxis?</p>
  <div class="search-bar">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="search-input" class="search-input" placeholder="z.B. Was kostet ein Implantat?" onkeydown="handleSearchKey(event)">
    <button class="search-btn" onclick="sendSearchQuery()">Fragen</button>
  </div>
  <div class="suggestions" id="chips">
    <span class="chip" onclick="sendChip('Termin vereinbaren')">Termin vereinbaren</span>
    <span class="chip" onclick="sendChip('Was sind die Öffnungszeiten?')">Öffnungszeiten</span>
    <span class="chip" onclick="sendChip('Implantate')">Implantate</span>
    <span class="chip" onclick="sendChip('Aligner')">Aligner</span>
    <span class="chip" onclick="sendChip('Angstpatienten')">Angstpatienten</span>
    <span class="chip" onclick="sendChip('Anfahrt & Parken')">Anfahrt</span>
  </div>

  <div class="convo-container" id="convo"></div>

  <div class="convo-input-row" id="input-row" style="display:none;">
    <textarea id="convo-input" class="convo-input" rows="1" placeholder="Nachricht schreiben ..." onkeydown="handleChatKey(event)" oninput="autoResize(this)"></textarea>
    <button class="convo-send" onclick="sendChatMessage()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="disclaimer" id="disclaimer" style="display:none;">KI-Assistent &middot; kein Ersatz f&uuml;r &auml;rztliche Beratung</div>
  <div class="spacer"></div>
</div>

<script>
var PROXY_URL = "https://chatbot-holtenauer.xnptg8nm8k.workers.dev";
var PRAXIS_TEL = "0431 57667";
var conversationHistory = [];
var chatStarted = false;

var SYSTEM_PROMPT = "Du bist der freundliche KI-Assistent der Zahnarztpraxis 'Zahn\u00e4rzte auf der Holtenauer' in Kiel. Antworte stets auf Deutsch, herzlich und kompetent. Halte Antworten kurz \u2013 2-3 S\u00e4tze. Stelle am Ende eine kurze R\u00fcckfrage. Keine Diagnosen. Bei Kostenfragen: GKV kann Zuzahlungen haben, Privat meist vollen Schutz. Bei Schmerzen: 0431 57667. Bei Begr\u00fc\u00dfung IMMER: Willkommen bei den Zahn\u00e4rzten auf der Holtenauer! Sch\u00f6n, dass Sie da sind \u2013 wie kann ich Ihnen helfen?\n\nPRAXIS: Holtenauer Stra\u00dfe 68, Kiel. Tel: 0431 57667. Mo-Di 08-18, Mi 08-14, Do 08-18, Fr 08-13. Parkplatz Schlemmermarkt Freund. Bus: Schauenburgerstra\u00dfe. Team: Dr. Dominik Hunold, Dr. Liane Kruse, An\u00e4sthesist Detlev Stolle. Leistungen: Prophylaxe, Aligner/Invisalign (kostenlose Ersteinsch\u00e4tzung), Implantate, Parodontitis, Kronen, Bleaching, Veneers, Angstpatienten mit D\u00e4mmerschlaf. Ratenzahlung \u00fcber PVS.";

function startChat(firstMessage) {
  if (!chatStarted) {
    chatStarted = true;
    document.getElementById("convo").classList.add("open");
    document.getElementById("input-row").style.display = "flex";
    document.getElementById("disclaimer").style.display = "block";
    document.getElementById("chips").style.display = "none";
  }
  notifyResize();
  if (firstMessage) {
    addUserMessage(firstMessage);
    askAI(firstMessage);
  }
}

function addBotMessage(text) {
  var c = document.getElementById("convo");
  var div = document.createElement("div"); div.className = "msg bot";
  var b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
  var t = document.createElement("div"); t.className = "msg-time"; t.textContent = getTime();
  div.appendChild(b); div.appendChild(t); c.appendChild(div);
  notifyResize(); scrollBottom();
}

function addUserMessage(text) {
  var c = document.getElementById("convo");
  var div = document.createElement("div"); div.className = "msg user";
  var b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
  var t = document.createElement("div"); t.className = "msg-time"; t.textContent = getTime();
  div.appendChild(b); div.appendChild(t); c.appendChild(div);
  notifyResize(); scrollBottom();
}

function addQuickReplies(options) {
  var c = document.getElementById("convo");
  var div = document.createElement("div"); div.className = "quick-replies";
  for (var i = 0; i < options.length; i++) {
    (function(opt) {
      var btn = document.createElement("button"); btn.className = "qr-btn"; btn.textContent = opt;
      btn.onclick = function() { div.remove(); addUserMessage(opt); askAI(opt); };
      div.appendChild(btn);
    })(options[i]);
  }
  c.appendChild(div); notifyResize(); scrollBottom();
}

function showTyping() {
  var c = document.getElementById("convo");
  var div = document.createElement("div"); div.className = "msg bot"; div.id = "typing-ind";
  var b = document.createElement("div"); b.className = "bubble";
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(b); c.appendChild(div); scrollBottom();
}

function removeTyping() { var el = document.getElementById("typing-ind"); if (el) el.remove(); }

function askAI(text) {
  conversationHistory.push({ role: "user", content: text });
  showTyping();
  fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system: SYSTEM_PROMPT, messages: conversationHistory })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    removeTyping();
    if (data.content && data.content[0]) {
      var reply = data.content[0].text;
      conversationHistory.push({ role: "assistant", content: reply });
      addBotMessage(reply);
    } else { addBotMessage("Bitte rufen Sie uns direkt an: " + PRAXIS_TEL); }
  })
  .catch(function() { removeTyping(); addBotMessage("Fehler. Bitte kontaktieren Sie uns: " + PRAXIS_TEL); });
}

function sendSearchQuery() {
  var input = document.getElementById("search-input");
  var text = input.value.trim();
  input.value = "";
  startChat(text || null);
  if (!text && !chatStarted) {
    addBotMessage("Willkommen bei den Zahn\u00e4rzten auf der Holtenauer! Sch\u00f6n, dass Sie da sind \u2013 wie kann ich Ihnen helfen?");
    setTimeout(function() { addQuickReplies(["Termin vereinbaren", "Implantate", "Aligner", "Angstpatient"]); }, 300);
  }
}

function sendChip(text) { startChat(text); }

function sendChatMessage() {
  var input = document.getElementById("convo-input");
  var text = input.value.trim(); if (!text) return;
  addUserMessage(text); input.value = ""; input.style.height = "auto"; askAI(text);
}

function handleSearchKey(e) { if (e.key === "Enter") { e.preventDefault(); sendSearchQuery(); } }
function handleChatKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChatMessage(); } }
function autoResize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 80) + "px"; }
function scrollBottom() { setTimeout(function() { window.scrollTo(0, document.body.scrollHeight); }, 80); }
function getTime() { return new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }); }
function notifyResize() {
  setTimeout(function() {
    window.parent.postMessage({ iframeHeight: document.body.scrollHeight + 40 }, "*");
  }, 100);
}
notifyResize();
</script>
</body>
</html>
