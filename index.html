<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praxis-Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --white: #FFFFFF;
  --bg: #F7F7F5;
  --border: #E8E8E4;
  --text: #1A1A1A;
  --muted: #8A8A85;
  --light: #C4C4BF;
  --accent: #2D5954;
  --accent2: #3D7068;
  --trigger: #FF6B4A;
  --trigger2: #e85a38;
}
html, body { height: 100%; }
body { font-family: 'Inter', sans-serif; background: transparent; min-height: 100vh; }
#chat-trigger {
  position: fixed; bottom: 24px; right: 24px;
  width: 56px; height: 56px;
  background: var(--trigger); border-radius: 28px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(255,107,74,0.45);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  z-index: 9998;
}
#chat-trigger:hover { transform: translateY(-2px); background: var(--trigger2); }
#chat-window {
  position: fixed; bottom: 92px; right: 24px;
  width: 360px; max-height: 560px;
  background: var(--white); border-radius: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  display: flex; flex-direction: column; overflow: hidden;
  z-index: 9999; opacity: 0; transform: translateY(12px);
  pointer-events: none;
  transition: opacity 0.22s ease, transform 0.22s ease;
}
#chat-window.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
.chat-header {
  padding: 14px 16px; background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 11px;
  flex-shrink: 0;
}
.header-icon {
  width: 34px; height: 34px; background: var(--bg);
  border-radius: 9px; display: flex; align-items: center;
  justify-content: center; font-size: 17px; flex-shrink: 0;
}
.header-text h3 { font-size: 13.5px; font-weight: 500; color: var(--text); }
.header-text p { font-size: 11.5px; color: var(--muted); margin-top: 1px; font-weight: 300; }
.status-dot {
  display: inline-block; width: 6px; height: 6px;
  background: #52B788; border-radius: 50%;
  margin-right: 4px; vertical-align: middle;
}
.header-close {
  margin-left: auto; background: none; border: none;
  cursor: pointer; color: var(--muted); padding: 5px;
  border-radius: 7px; display: flex; flex-shrink: 0;
}
.header-close:hover { background: var(--bg); }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 9px;
  background: var(--bg); min-height: 0;
}
.msg { display: flex; flex-direction: column; max-width: 82%; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble { padding: 9px 13px; border-radius: 11px; font-size: 13.5px; line-height: 1.5; font-weight: 300; }
.msg.bot .bubble { background: var(--white); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
.msg.user .bubble { background: var(--accent); color: white; font-weight: 400; border-bottom-right-radius: 3px; }
.msg-time { font-size: 10px; color: var(--light); margin-top: 3px; font-weight: 300; }
.msg.user .msg-time { text-align: right; }
.typing-dots { display: flex; gap: 3px; align-items: center; padding: 2px 0; }
.typing-dots span { width: 5px; height: 5px; background: var(--light); border-radius: 50%; animation: dot 1.2s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
.quick-replies { display: flex; flex-wrap: wrap; gap: 5px; }
.qr-btn {
  background: var(--white); border: 1px solid var(--border);
  color: var(--text); padding: 5px 11px; border-radius: 7px;
  font-size: 12px; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: all 0.14s;
}
.qr-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
.contact-form {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 11px; padding: 13px;
  display: flex; flex-direction: column; gap: 9px; width: 100%;
}
.cf-title { font-size: 13px; font-weight: 500; color: var(--text); }
.contact-form label { font-size: 10.5px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 3px; }
.contact-form input, .contact-form textarea {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: 7px; font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 300; color: var(--text);
  background: var(--bg); outline: none; resize: none;
}
.contact-form input:focus, .contact-form textarea:focus { border-color: var(--accent); }
.cf-row { display: flex; flex-direction: column; }
.submit-btn {
  background: var(--accent); color: white; border: none;
  padding: 8px; border-radius: 7px; font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer;
}
.submit-btn:hover { background: var(--accent2); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.chat-input-bar {
  padding: 10px 12px; background: var(--white);
  border-top: 1px solid var(--border);
  display: flex; gap: 7px; align-items: flex-end;
  flex-shrink: 0; width: 100%;
}
#user-input {
  flex: 1; min-width: 0; padding: 8px 11px; border: 1px solid var(--border);
  border-radius: 9px; font-family: 'Inter', sans-serif;
  font-size: 16px; font-weight: 300; color: var(--text);
  background: var(--bg); outline: none;
  resize: none; max-height: 80px; overflow-y: auto; line-height: 1.45;
}
#user-input:focus { border-color: var(--accent); }
#user-input::placeholder { color: var(--light); }
#send-btn {
  width: 34px; height: 34px; min-width: 34px; background: var(--accent);
  border: none; border-radius: 9px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
#send-btn:hover { background: var(--accent2); }
.chat-disclaimer {
  text-align: center; font-size: 10px; color: var(--light);
  padding: 4px 12px 7px; background: var(--white); font-weight: 300;
  flex-shrink: 0;
}
@media (max-width: 480px) {
  #chat-window {
    position: fixed;
    width: 100%; left: 0; right: 0; bottom: 0;
    max-height: 80vh; border-radius: 16px 16px 0 0;
  }
  #chat-trigger { right: 16px; bottom: 16px; }
}
</style>
</head>
