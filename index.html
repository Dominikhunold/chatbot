<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praxis-Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --white: #FFFFFF;
  --bg: #F7F7F5;
  --border: #E8E8E4;
  --text: #1A1A1A;
  --muted: #8A8A85;
  --light: #C4C4BF;
  --accent: #2D5954;
  --accent2: #3D7068;
  --trigger: #FF6B4A;
  --trigger2: #e85a38;
}
html, body { height: 100%; }
body { font-family: 'Inter', sans-serif; background: transparent; min-height: 100vh; pointer-events: none; }
#chat-trigger {
  position: fixed; bottom: 24px; right: 24px;
  width: 56px; height: 56px;
  background: var(--trigger); border-radius: 28px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(255,107,74,0.45);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  z-index: 9998; pointer-events: all;
}
#chat-trigger:hover { transform: translateY(-2px); background: var(--trigger2); }
#chat-window {
  position: fixed; bottom: 92px; right: 16px;
  width: min(360px, calc(100vw - 32px));
  max-height: calc(100vh - 120px);
  background: var(--white); border-radius: 16px; border: 1px solid var(--border);
  box-shadow: 0 8px 40px rgba(0,0,0,0.12); display: flex; flex-direction: column;
  overflow: hidden; z-index: 9999; opacity: 0; pointer-events: none;
  transition: opacity 0.22s ease, transform 0.22s ease;
  transform: translateY(12px);
}
#chat-window.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
.chat-header { padding: 14px 16px; background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 11px; flex-shrink: 0; }
.header-icon { width: 34px; height: 34px; background: var(--bg); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.header-text h3 { font-size: 13.5px; font-weight: 500; color: var(--text); }
.header-text p { font-size: 11.5px; color: var(--muted); margin-top: 1px; font-weight: 300; }
.status-dot { display: inline-block; width: 6px; height: 6px; background: #52B788; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.header-close { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--muted); padding: 5px; border-radius: 7px; display: flex; flex-shrink: 0; }
.header-close:hover { background: var(--bg); }
.chat-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 9px; background: var(--bg); min-height: 0; }
.msg { display: flex; flex-direction: column; max-width: 82%; }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; }
.bubble { padding: 9px 13px; border-radius: 11px; font-size: 13.5px; line-height: 1.5; font-weight: 300; }
.msg.bot .bubble { background: var(--white); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
.msg.user .bubble { background: var(--accent); color: white; font-weight: 400; border-bottom-right-radius: 3px; }
.msg-time { font-size: 10px; color: var(--light); margin-top: 3px; font-weight: 300; }
.msg.user .msg-time { text-align: right; }
.typing-dots { display: flex; gap: 3px; align-items: center; padding: 2px 0; }
.typing-dots span { width: 5px; height: 5px; background: var(--light); border-radius: 50%; animation: dot 1.2s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot { 0%,80%,100% { transform: scale(0.7); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
.quick-replies { display: flex; flex-wrap: wrap; gap: 5px; }
.qr-btn { background: var(--white); border: 1px solid var(--border); color: var(--text); padding: 5px 11px; border-radius: 7px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.14s; }
.qr-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
.contact-form { background: var(--white); border: 1px solid var(--border); border-radius: 11px; padding: 13px; display: flex; flex-direction: column; gap: 9px; width: 100%; }
.cf-title { font-size: 13px; font-weight: 500; color: var(--text); }
.contact-form label { font-size: 10.5px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 3px; }
.contact-form input, .contact-form textarea { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; color: var(--text); background: var(--bg); outline: none; resize: none; }
.contact-form input:focus, .contact-form textarea:focus { border-color: var(--accent); }
.cf-row { display: flex; flex-direction: column; }
.dsgvo-row { display: flex; gap: 8px; align-items: flex-start; margin-top: 2px; }
.dsgvo-row input[type="checkbox"] { width: auto; flex-shrink: 0; margin-top: 2px; accent-color: #2D5954; }
.dsgvo-label { font-size: 11px !important; font-weight: 300 !important; color: #8A8A85 !important; text-transform: none !important; letter-spacing: 0 !important; line-height: 1.5 !important; display: block !important; margin-bottom: 0 !important; }
.submit-btn { background: var(--accent); color: white; border: none; padding: 8px; border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; }
.submit-btn:hover { background: var(--accent2); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.chat-input-bar { padding: 10px 12px; background: var(--white); border-top: 1px solid var(--border); display: flex; gap: 7px; align-items: flex-end; flex-shrink: 0; width: 100%; }
#user-input { flex: 1; min-width: 0; padding: 8px 11px; border: 1px solid var(--border); border-radius: 9px; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 300; color: var(--text); background: var(--bg); outline: none; resize: none; max-height: 80px; overflow-y: auto; line-height: 1.45; }
#user-input:focus { border-color: var(--accent); }
#user-input::placeholder { color: var(--light); }
#send-btn { width: 34px; height: 34px; min-width: 34px; background: var(--accent); border: none; border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
#send-btn:hover { background: var(--accent2); }
.chat-disclaimer { text-align: center; font-size: 10px; color: var(--light); padding: 4px 12px 7px; background: var(--white); font-weight: 300; flex-shrink: 0; }
</style>
</head>
<body>

<button id="chat-trigger" onclick="toggleChat()" aria-label="Assistent">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<div id="chat-window">
  <div class="chat-header">
    <div class="header-icon">&#x1F9B7;</div>
    <div class="header-text">
      <h3>Praxis-Assistent</h3>
      <p><span class="status-dot"></span>Online</p>
    </div>
    <button class="header-close" onclick="toggleChat()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-bar">
    <textarea id="user-input" rows="1" placeholder="Nachricht ..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="chat-disclaimer">KI-Assistent &middot; kein Ersatz f&uuml;r &auml;rztliche Beratung &middot; <a href="https://www.zahnarzt-holtenauer.de/j/privacy" target="_blank" style="color:var(--muted);text-decoration:underline;">Datenschutz</a></div>
</div>

<script>
var PRAXIS_TEL = "0431 57667";
var PROXY_URL = "https://chatbot-holtenauer.xnptg8nm8k.workers.dev";
var WEB3FORMS_KEY = "b112285a-e3cc-4639-a621-d1f1cc37859e";
var weatherCache = null;
var chatOpen = false;
var conversationHistory = [];
var contactFormShown = false;

var SYSTEM_PROMPT = "Du bist der freundliche KI-Assistent der Zahnarztpraxis 'Zahnärzte auf der Holtenauer' in Kiel. Antworte stets auf Deutsch, herzlich und kompetent. Halte Antworten sehr kurz – maximal 2 Sätze. Auf dem Handy muss die Antwort ins Sichtfeld passen. Lieber kürzer als länger. Stelle am Ende jeder Antwort eine kurze natürliche Rückfrage. Stelle keine Diagnosen. WICHTIG: Wenn du nicht sicher bist ob eine Leistung angeboten wird, verneine NIEMALS - verweise stattdessen freundlich auf die Praxis: 'Ruf uns an unter 0431 57667 oder schreib uns, wir helfen gerne weiter!' WICHTIG bei Kostenfragen: Sage NIEMALS, dass eine Behandlung komplett von der gesetzlichen Krankenkasse übernommen wird. Bei GKV-Patienten können für hochwertige Materialien Zuzahlungen entstehen. Privat Versicherte haben in der Regel vollen Versicherungsschutz. Bei konkreten Kostenfragen empfehle einen individuellen Heil- und Kostenplan. Bei akuten Schmerzen weise auf die Notfallnummer hin: 0431 57667. Bei Begrüßung antworte IMMER mit: Willkommen bei den Zahnärzten auf der Holtenauer! Schön, dass Sie da sind – wie kann ich Ihnen helfen?\n\n--- PRAXISINFOS ---\nAdresse: Holtenauer Straße 68, 24105 Kiel. Telefon: 0431 57667. Email: praxis@zahnarzt-holtenauer.de.\nÖffnungszeiten: Mo 08-18, Di 08-18, Mi 08-14, Do 08-18, Fr 08-13 Uhr. Flexible Termine für Berufstätige möglich.\nTeam: Dr. Dominik Hunold (Inhaber), Dr. Liane Kruse, Anästhesist Detlev Stolle.\nLeistungen: Zahnerhalt und Prophylaxe, Aligner/Invisalign (kostenlose Ersteinschätzung), Implantate, Parodontitis-Behandlung, Kronen und Brücken, Bleaching, Veneers, Angstpatienten-Betreuung mit Dämmerschlaf, Schnarchschienen, Sportmundschutz, Zahnfleischbehandlung, ästhetische Zahnbehandlungen, zahnfarbene Keramikfüllungen.\nAnfahrt: Parkplatz Schlemmermarkt Freund direkt hinter der Praxis. Bus: Haltestelle Schauenburgerstraße, Linien 11, 60s, 62, 501/502, 900/901.\nService: Ratenzahlung über PVS (kostenlos bis 6 Monate).";

async function fetchWeather() {
  if (weatherCache) return weatherCache;
  try {
    var resp = await fetch("https://api.open-meteo.com/v1/forecast?latitude=54.3233&longitude=10.1228&current=temperature_2m,precipitation,weathercode,windspeed_10m,apparent_temperature&timezone=Europe%2FBerlin&forecast_days=1");
    var data = await resp.json();
    var c = data.current;
    var codes = {0:"klar",1:"meist klar",2:"teilweise bewölkt",3:"bewölkt",45:"neblig",51:"leichter Nieselregen",61:"leichter Regen",63:"Regen",65:"starker Regen",71:"leichter Schneefall",73:"Schneefall",80:"Regenschauer",95:"Gewitter"};
    var desc = codes[c.weathercode] || "wechselhaft";
    var glatt = c.weathercode >= 71 && c.weathercode <= 77;
    var regen = (c.weathercode >= 51 && c.weathercode <= 67) || (c.weathercode >= 80 && c.weathercode <= 82);
    var wind = c.windspeed_10m > 30;
    var hinweis = glatt ? "Achtung Glätte! Bitte Bus nutzen." : regen ? "Es regnet. Fahrrad oder Bus nutzen." : wind ? "Starker Wind, Fahrrad nicht empfohlen." : "Gute Bedingungen für die Anfahrt.";
    weatherCache = "[WETTER KIEL: " + desc + ", " + Math.round(c.temperature_2m) + "°C, Wind " + Math.round(c.windspeed_10m) + " km/h. " + hinweis + "]";
    return weatherCache;
  } catch(e) { return null; }
}

function notifyParent(open) {
  try { window.parent.postMessage({ chatbotOpen: open }, "*"); } catch(e) {}
}

function toggleChat() {
  chatOpen = !chatOpen;
  var win = document.getElementById("chat-window");
  if (chatOpen) {
    win.classList.add("visible");
    notifyParent(true);
    if (document.getElementById("chat-messages").children.length === 0) setTimeout(showWelcome, 150);
    setTimeout(function() { document.getElementById("user-input").focus(); }, 280);
  } else {
    win.classList.remove("visible");
    notifyParent(false);
  }
}

function showWelcome() {
  addBotMessage("Willkommen bei den Zahnärzten auf der Holtenauer! Schön, dass Sie da sind – wie kann ich Ihnen helfen?");
  setTimeout(function() {
    addQuickReplies(["Termin vereinbaren", "Anfahrt & Parken", "Implantate", "Aligner", "Angstpatient", "Kontakt"]);
  }, 300);
}

function addBotMessage(text) {
  var c = document.getElementById("chat-messages");
  var div = document.createElement("div"); div.className = "msg bot";
  var b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
  var t = document.createElement("div"); t.className = "msg-time"; t.textContent = getTime();
  div.appendChild(b); div.appendChild(t); c.appendChild(div); scrollBottom();
  return div;
}

function addUserMessage(text) {
  var c = document.getElementById("chat-messages");
  var div = document.createElement("div"); div.className = "msg user";
  var b = document.createElement("div"); b.className = "bubble"; b.textContent = text;
  var t = document.createElement("div"); t.className = "msg-time"; t.textContent = getTime();
  div.appendChild(b); div.appendChild(t); c.appendChild(div); scrollBottom();
}

function addQuickReplies(options) {
  var c = document.getElementById("chat-messages");
  var div = document.createElement("div"); div.className = "quick-replies";
  for (var i = 0; i < options.length; i++) {
    (function(opt) {
      var btn = document.createElement("button"); btn.className = "qr-btn"; btn.textContent = opt;
      btn.onclick = function() { div.remove(); handleQuickReply(opt); };
      div.appendChild(btn);
    })(options[i]);
  }
  c.appendChild(div); scrollBottom();
}

function handleQuickReply(opt) {
  addUserMessage(opt);
  if (opt === "Kontakt") { showContactForm(); return; }
  if (opt === "Termin vereinbaren") {
    addBotMessage("Ich öffne das Terminformular für Sie – dort können Sie Ihren Wunschtermin direkt anfragen!");
    try { window.parent.postMessage({ action: "openWunschtermin" }, "*"); } catch(e) {}
    return;
  }
  askAI(opt);
}

function showTyping() {
  var c = document.getElementById("chat-messages");
  var div = document.createElement("div"); div.className = "msg bot"; div.id = "typing-indicator";
  var b = document.createElement("div"); b.className = "bubble";
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(b); c.appendChild(div); scrollBottom();
}

function removeTyping() { var el = document.getElementById("typing-indicator"); if (el) el.remove(); }

var weatherKW = ["wetter","fahrrad","anfahrt","parken","parkplatz","bus","glätte","glatt","regen","schnee","wind","anreise","eis"];

async function askAI(userText) {
  conversationHistory.push({ role: "user", content: userText });
  showTyping();
  var contactKW = ["termin","rueckruf","email","kontakt","anfrage","melden","anruf","vereinbaren"];
  for (var i = 0; i < contactKW.length; i++) {
    if (userText.toLowerCase().indexOf(contactKW[i]) !== -1 && !contactFormShown) {
      removeTyping();
      addBotMessage("Gerne helfe ich Ihnen einen Termin zu vereinbaren! Füllen Sie das Kontaktformular aus und wir melden uns schnellstmöglich bei Ihnen.");
      setTimeout(showContactForm, 350);
      return;
    }
  }
  var weatherContext = "";
  var lc = userText.toLowerCase();
  for (var j = 0; j < weatherKW.length; j++) {
    if (lc.indexOf(weatherKW[j]) !== -1) {
      var w = await fetchWeather();
      if (w) weatherContext = "\n\n" + w;
      break;
    }
  }
  fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system: SYSTEM_PROMPT + weatherContext, messages: conversationHistory })
  })
  .then(function(resp) { return resp.json(); })
  .then(function(data) {
    removeTyping();
    if (data.content && data.content[0]) {
      var reply = data.content[0].text;
      conversationHistory.push({ role: "assistant", content: reply });
      addBotMessage(reply);
    } else { addBotMessage("Bitte rufen Sie uns direkt an: " + PRAXIS_TEL); }
  })
  .catch(function() { removeTyping(); addBotMessage("Ein Fehler ist aufgetreten. Bitte kontaktieren Sie uns unter " + PRAXIS_TEL); });
}

function showContactForm() {
  contactFormShown = true;
  var c = document.getElementById("chat-messages");
  var wrapper = document.createElement("div"); wrapper.className = "msg bot";
  wrapper.style.maxWidth = "100%"; wrapper.style.width = "100%";
  var form = document.createElement("div"); form.className = "contact-form"; form.id = "contact-form-inner";
  form.innerHTML =
    '<div class="cf-title">Kontaktanfrage</div>' +
    '<div class="cf-row"><label>Name</label><input type="text" id="cf-name" placeholder="Ihr Name"></div>' +
    '<div class="cf-row"><label>Telefon</label><input type="tel" id="cf-tel" placeholder="Ihre Telefonnummer"></div>' +
    '<div class="cf-row"><label>E-Mail</label><input type="email" id="cf-email" placeholder="Ihre E-Mail"></div>' +
    '<div class="cf-row"><label>Anliegen</label><textarea id="cf-msg" rows="2" placeholder="Kurze Beschreibung"></textarea></div>' +
    '<div class="dsgvo-row"><input type="checkbox" id="cf-dsgvo"><label for="cf-dsgvo" class="dsgvo-label">Ich stimme der Verarbeitung meiner Daten gem&auml;&szlig; der <a href="https://www.zahnarzt-holtenauer.de/j/privacy" target="_blank" style="color:#2D5954">Datenschutzerkl&auml;rung</a> zu.</label></div>' +
    '<button class="submit-btn" id="cf-submit">Absenden</button>';
  wrapper.appendChild(form); c.appendChild(wrapper);
  document.getElementById("cf-submit").addEventListener("click", function() { submitContact(this); });
  scrollBottom();
}

function submitContact(btn) {
  var name = document.getElementById("cf-name").value.trim();
  var tel = document.getElementById("cf-tel").value.trim();
  var email = document.getElementById("cf-email").value.trim();
  var msg = document.getElementById("cf-msg").value.trim();
  var dsgvo = document.getElementById("cf-dsgvo").checked;
  if (!name || (!tel && !email)) { btn.textContent = "Bitte Name und Kontakt ausfüllen"; setTimeout(function() { btn.textContent = "Absenden"; }, 2000); return; }
  if (!dsgvo) { btn.textContent = "Bitte Datenschutz bestätigen"; setTimeout(function() { btn.textContent = "Absenden"; }, 2000); return; }
  btn.textContent = "Wird gesendet..."; btn.disabled = true;
  fetch("https://api.web3forms.com/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify({ access_key: WEB3FORMS_KEY, subject: "Neue Chatbot-Anfrage - Zahnarzt Holtenauer", name: name, telefon: tel, email: email, anliegen: msg })
  })
  .then(function(resp) { return resp.json(); })
  .then(function() {
    document.getElementById("contact-form-inner").innerHTML =
      '<div style="text-align:center;padding:10px 0"><div style="font-size:22px;margin-bottom:8px;color:#52B788">&#10003;</div>' +
      '<div style="font-size:13px;font-weight:500;color:#1A1A1A">Vielen Dank, ' + name + '!</div>' +
      '<div style="font-size:12px;color:#8A8A85;margin-top:4px">Wir melden uns so schnell wie möglich bei Ihnen.</div></div>';
    scrollBottom();
  })
  .catch(function() { btn.textContent = "Fehler - bitte erneut versuchen"; btn.disabled = false; });
}

function sendMessage() {
  var input = document.getElementById("user-input");
  var text = input.value.trim(); if (!text) return;
  addUserMessage(text); input.value = ""; input.style.height = "auto"; askAI(text);
}
function handleKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 80) + "px"; }
function scrollBottom() { var c = document.getElementById("chat-messages"); setTimeout(function() { c.scrollTop = c.scrollHeight; }, 50); }
function getTime() { return new Date().toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" }); }

// Listener für Jimdo-Button (postMessage von außen)
window.addEventListener("message", function(e) {
  if (e.data && e.data.action === "open" && !chatOpen) {
    toggleChat();
  }
});
</script>
</body>
</html>
