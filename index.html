<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praxis-Assistent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --white:   #FFFFFF;
    --bg:      #F7F7F5;
    --border:  #E8E8E4;
    --text:    #1A1A1A;
    --muted:   #8A8A85;
    --light:   #C4C4BF;
    --accent:  #2D5954;
    --accent2: #3D7068;
  }
  body { font-family: 'Inter', sans-serif; background: transparent; min-height: 40px; }
  #chat-trigger {
    position: fixed; bottom: 24px; right: 24px;
    width: 56px; height: 56px;
    background: var(--accent); border-radius: 28px; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(45,89,84,0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    z-index: 9998;
  }
  #chat-trigger:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(45,89,84,0.4); }
  #chat-window {
    position: fixed; bottom: 92px; right: 24px;
    width: 360px; max-height: 560px;
    background: var(--white); border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    display: flex; flex-direction: column; overflow: hidden;
    z-index: 9999; opacity: 0; transform: translateY(12px);
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  #chat-window.visible { opacity: 1; transform: translateY(0); pointer-events: all; }
  .chat-header {
    padding: 14px 16px; background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 11px;
  }
  .header-icon {
    width: 34px; height: 34px; background: var(--bg);
    border-radius: 9px; display: flex; align-items: center;
    justify-content: center; font-size: 17px; flex-shrink: 0;
  }
  .header-text h3 { font-size: 13.5px; font-weight: 500; color: var(--text); letter-spacing: -0.01em; }
  .header-text p { font-size: 11.5px; color: var(--muted); margin-top: 1px; font-weight: 300; }
  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    background: #52B788; border-radius: 50%;
    margin-right: 4px; vertical-align: middle;
  }
  .header-close {
    margin-left: auto; background: none; border: none;
    cursor: pointer; color: var(--muted); padding: 5px;
    border-radius: 7px; display: flex;
    transition: background 0.15s, color 0.15s;
  }
  .header-close:hover { background: var(--bg); color: var(--text); }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 14px;
    display: flex; flex-direction: column; gap: 9px;
    background: var(--bg); scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 3px; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg { display: flex; flex-direction: column; max-width: 82%; animation: fadeUp 0.18s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
  .msg.bot  { align-self: flex-start; }
  .msg.user { align-self: flex-end; }
  .bubble { padding: 9px 13px; border-radius: 11px; font-size: 13.5px; line-height: 1.5; font-weight: 300; }
  .msg.bot .bubble  { background: var(--white); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .msg.user .bubble { background: var(--accent); color: white; font-weight: 400; border-bottom-right-radius: 3px; }
  .msg-time { font-size: 10px; color: var(--light); margin-top: 3px; padding: 0 2px; font-weight: 300; }
  .msg.user .msg-time { text-align: right; }
  .typing-dots { display: flex; gap: 3px; align-items: center; padding: 2px 0; }
  .typing-dots span { width: 5px; height: 5px; background: var(--light); border-radius: 50%; animation: dot 1.2s ease-in-out infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot { 0%,80%,100% { transform:scale(0.7); opacity:0.4; } 40% { transform:scale(1); opacity:1; } }
  .quick-replies { display: flex; flex-wrap: wrap; gap: 5px; padding: 1px 0; }
  .qr-btn {
    background: var(--white); border: 1px solid var(--border);
    color: var(--text); padding: 5px 11px; border-radius: 7px;
    font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 400;
    cursor: pointer; transition: all 0.14s; letter-spacing: -0.01em;
  }
  .qr-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  .contact-form {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 11px; padding: 13px;
    display: flex; flex-direction: column; gap: 9px;
    animation: fadeUp 0.18s ease; width: 100%;
  }
  .cf-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .contact-form label { font-size: 10.5px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 3px; }
  .contact-form input, .contact-form textarea {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 7px; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 300; color: var(--text);
    background: var(--bg); outline: none; transition: border-color 0.14s; resize: none;
  }
  .contact-form input:focus, .contact-form textarea:focus { border-color: var(--accent); }
  .cf-row { display: flex; flex-direction: column; }
  .submit-btn {
    background: var(--accent); color: white; border: none;
    padding: 8px; border-radius: 7px; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.14s;
  }
  .submit-btn:hover { background: var(--accent2); }
  .chat-input-bar {
    padding: 10px 12px; background: var(--white);
    border-top: 1px solid var(--border);
    display: flex; gap: 7px; align-items: flex-end;
  }
  #user-input {
    flex: 1; padding: 8px 11px; border: 1px solid var(--border);
    border-radius: 9px; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 300; color: var(--text);
    background: var(--bg); outline: none; transition: border-color 0.14s;
    resize: none; max-height: 80px; overflow-y: auto; line-height: 1.45;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--light); }
  #send-btn {
    width: 34px; height: 34px; background: var(--accent);
    border: none; border-radius: 9px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.14s; flex-shrink: 0;
  }
  #send-btn:hover { background: var(--accent2); }
  .chat-disclaimer {
    text-align: center; font-size: 10px; color: var(--light);
    padding: 4px 12px 7px; background: var(--white); font-weight: 300;
  }
  @media (max-width: 420px) {
    #chat-window { width: calc(100vw - 16px); right: 8px; bottom: 84px; }
    #chat-trigger { right: 12px; bottom: 12px; }
  }
</style>
</head>
<body>

<button id="chat-trigger" onclick="toggleChat()" aria-label="Assistent öffnen">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<div id="chat-window" role="dialog">
  <div class="chat-header">
    <div class="header-icon">🦷</div>
    <div class="header-text">
      <h3>Praxis-Assistent</h3>
      <p><span class="status-dot"></span>Online</p>
    </div>
    <button class="header-close" onclick="toggleChat()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-bar">
    <textarea id="user-input" rows="1" placeholder="Nachricht …" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="chat-disclaimer">KI-Assistent · kein Ersatz für ärztliche Beratung</div>
</div>

<script>
  const PRAXIS_NAME     = "Zahnärzte auf der Holtenauer";
  const PRAXIS_TEL      = "0431 / 57667";
  const PRAXIS_EMAIL    = "praxis@zahnarzt-holtenauer.de";
  const OEFFNUNGSZEITEN = "Mo 8-18 Uhr, Di 8-18 Uhr, Mi 8-14 Uhr, Do 8-18 Uhr, Fr 8-14 Uhr";
  const PROXY_URL       = "https://eoifesw19nolr5z.m.pipedream.net";

  const SYSTEM_PROMPT = `Du bist der freundliche KI-Assistent der ${PRAXIS_NAME}.
Du beantwortest Fragen rund um die Zahnarztpraxis: Öffnungszeiten (${OEFFNUNGSZEITEN}), Terminbuchung, Leistungen (Prophylaxe, Füllungen, Zahnersatz, Implantate, Bleaching, Kieferorthopädie, Notfallbehandlung), Krankenkasse/Abrechnung und allgemeine Fragen.
Telefon: ${PRAXIS_TEL} | E-Mail: ${PRAXIS_EMAIL}
Regeln:
- Antworte stets auf Deutsch, freundlich und professionell
- Halte Antworten kurz (max. 3 Sätze)
- Gib KEINE medizinischen Diagnosen oder Behandlungsempfehlungen
- Bei Schmerzen/Notfällen: sofort auf Notfallnummer hinweisen
- Wenn du eine Kontaktanfrage erkennst, sag dem Nutzer er soll auf "Kontaktanfrage senden" klicken
- Formuliere in natürlichem Fließtext, keine Aufzählungen`;

  let chatOpen = false;
  let conversationHistory = [];
  let contactFormShown = false;

  function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('chat-window').classList.toggle('visible', chatOpen);
    if (chatOpen && document.getElementById('chat-messages').children.length === 0) {
      setTimeout(showWelcome, 150);
    }
    if (chatOpen) setTimeout(() => document.getElementById('user-input').focus(), 280);
  }

  function showWelcome() {
    addBotMessage(`Willkommen bei ${PRAXIS_NAME}. Wie kann ich Ihnen helfen?`);
    setTimeout(() => {
      addQuickReplies(["Termin vereinbaren", "Öffnungszeiten", "Leistungen", "Notfall", "Kontakt"]);
    }, 300);
  }

  function addBotMessage(text, isHTML = false) {
    const c = document.getElementById('chat-messages');
    const div = document.createElement('div'); div.className = 'msg bot';
    const b = document.createElement('div'); b.className = 'bubble';
    if (isHTML) b.innerHTML = text; else b.textContent = text;
    const t = document.createElement('div'); t.className = 'msg-time'; t.textContent = now();
    div.appendChild(b); div.appendChild(t); c.appendChild(div); scrollBottom();
    return div;
  }

  function addUserMessage(text) {
    const c = document.getElementById('chat-messages');
    const div = document.createElement('div'); div.className = 'msg user';
    const b = document.createElement('div'); b.className = 'bubble'; b.textContent = text;
    const t = document.createElement('div'); t.className = 'msg-time'; t.textContent = now();
    div.appendChild(b); div.appendChild(t); c.appendChild(div); scrollBottom();
  }

  function addQuickReplies(options) {
    const c = document.getElementById('chat-messages');
    const div = document.createElement('div'); div.className = 'quick-replies';
    options.forEach(opt => {
      const btn = document.createElement('button'); btn.className = 'qr-btn'; btn.textContent = opt;
      btn.onclick = () => { div.remove(); handleQuickReply(opt); };
      div.appendChild(btn);
    });
    c.appendChild(div); scrollBottom();
  }

  function handleQuickReply(opt) {
    addUserMessage(opt);
    if (opt === "Kontakt") { showContactForm(); return; }
    askAI(opt);
  }

  function showTyping() {
    const c = document.getElementById('chat-messages');
    const div = document.createElement('div'); div.className = 'msg bot'; div.id = 'typing-indicator';
    const b = document.createElement('div'); b.className = 'bubble';
    b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    div.appendChild(b); c.appendChild(div); scrollBottom();
  }

  function removeTyping() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

  async function askAI(userText) {
    conversationHistory.push({ role: "user", content: userText });
    showTyping();

    const contactKeywords = ["termin", "rückruf", "email", "kontakt", "anfrage", "melden", "anruf"];
    if (contactKeywords.some(k => userText.toLowerCase().includes(k)) && !contactFormShown) {
      removeTyping();
      addBotMessage("Gerne. Füllen Sie das Formular aus und wir melden uns bei Ihnen.");
      setTimeout(showContactForm, 350);
      return;
    }

    try {
      const resp = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ system: SYSTEM_PROMPT, messages: conversationHistory })
      });
      const data = await resp.json();
      removeTyping();
      if (data.content && data.content[0]) {
        const reply = data.content[0].text;
        conversationHistory.push({ role: "assistant", content: reply });
        addBotMessage(reply);
        if (!contactFormShown && (reply.includes("Formular") || reply.includes("kontaktieren") || reply.includes("Termin"))) {
          setTimeout(() => addQuickReplies(["Kontaktanfrage senden"]), 400);
        }
      } else {
        addBotMessage("Bitte rufen Sie uns direkt an: " + PRAXIS_TEL);
      }
    } catch (e) {
      removeTyping();
      addBotMessage(`Ein Fehler ist aufgetreten. Bitte kontaktieren Sie uns unter ${PRAXIS_TEL}.`);
    }
  }

  function showContactForm() {
    contactFormShown = true;
    const c = document.getElementById('chat-messages');
    const wrapper = document.createElement('div');
    wrapper.className = 'msg bot'; wrapper.style.cssText = 'max-width:100%;width:100%';
    wrapper.innerHTML = `
      <div class="contact-form">
        <div class="cf-title">Kontaktanfrage</div>
        <div class="cf-row"><label>Name</label><input type="text" id="cf-name" placeholder="Ihr Name" autocomplete="name"></div>
        <div class="cf-row"><label>Telefon oder E-Mail</label><input type="text" id="cf-contact" placeholder="Kontakt" autocomplete="email"></div>
        <div class="cf-row"><label>Anliegen</label><textarea id="cf-msg" rows="2" placeholder="Kurze Beschreibung …"></textarea></div>

```
    <button class="submit-btn" onclick="submitContact(this)">Absenden</button>
  </div>`;
c.appendChild(wrapper); scrollBottom();
```

}

function submitContact(btn) {
const name    = document.getElementById(‘cf-name’).value.trim();
const contact = document.getElementById(‘cf-contact’).value.trim();
const msg     = document.getElementById(‘cf-msg’).value.trim();
if (!name || !contact) {
btn.textContent = ‘Bitte Name & Kontakt ausfüllen’;
setTimeout(() => btn.textContent = ‘Absenden’, 2000); return;
}
const subject = encodeURIComponent(`Kontaktanfrage von ${name}`);
const body    = encodeURIComponent(`Name: ${name}\nKontakt: ${contact}\n\nAnliegen:\n${msg}`);
window.location.href = `mailto:${PRAXIS_EMAIL}?subject=${subject}&body=${body}`;
btn.closest(’.contact-form’).innerHTML = ` <div style="text-align:center;padding:10px 0;"> <div style="font-size:20px;margin-bottom:7px;color:#52B788">✓</div> <div style="font-size:13px;font-weight:500;color:#1A1A1A;">Vielen Dank, ${name}</div> <div style="font-size:12px;color:#8A8A85;margin-top:3px;font-weight:300;">Wir melden uns in Kürze.</div> </div>`;
scrollBottom();
}

function sendMessage() {
const input = document.getElementById(‘user-input’);
const text = input.value.trim();
if (!text) return;
addUserMessage(text); input.value = ‘’; input.style.height = ‘auto’; askAI(text);
}

function handleKey(e) {
if (e.key === ‘Enter’ && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
el.style.height = ‘auto’;
el.style.height = Math.min(el.scrollHeight, 80) + ‘px’;
}

function scrollBottom() {
const c = document.getElementById(‘chat-messages’);
setTimeout(() => c.scrollTop = c.scrollHeight, 50);
}

function now() {
return new Date().toLocaleTimeString(‘de-DE’, { hour: ‘2-digit’, minute: ‘2-digit’ });
}
</script>

</body>
</html>
